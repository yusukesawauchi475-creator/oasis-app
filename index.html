<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Oasis v4 — いますぐ、トイレ。</title>
<meta name="theme-color" content="#1A2744">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<link rel="icon" href="oasis-logo.jpg">
<link rel="apple-touch-icon" href="oasis-logo.jpg">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;500;700&family=Shippori+Mincho+B1:wght@400;600;800&display=swap" rel="stylesheet">
<style>
:root {
  --cream:      #F9F5EE;
  --indigo:     #1A2744;
  --vermillion: #C63C28;
  --sand:       #E2D5C0;
  --sand2:      #EDE5D8;
  --moss:       #3D7A4F;
  --amber:      #C07830;
  --gold:       #9A7A10;
  --brick:      #8B3A2A;
  --partner:    #4A6B2E;
  --blue:       #3B82F6;
  --text:       #1A2744;
  --text2:      #5A6480;
  --text3:      #9199AD;
  --r: 14px;
  --r-lg: 20px;
  --sheet-safe: env(safe-area-inset-bottom, 0px);
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body { height: 100%; margin: 0; overflow: hidden;
  font-family: 'Zen Maru Gothic', 'Noto Sans JP', 'Hiragino Kaku Gothic ProN', sans-serif;
  background: var(--cream); color: var(--text); }
#app { display: flex; flex-direction: column; height: 100dvh; }

/* ──────────── MAP ──────────── */
#map {
  flex: 1; position: relative; min-height: 0;
  filter: sepia(0.12) saturate(0.85) brightness(1.04);
}
.leaflet-control-zoom,
.leaflet-control-attribution { display: none !important; }

/* ──────────── LOADING ──────────── */
#loading {
  position: fixed; inset: 0; z-index: 3000;
  background: var(--cream);
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  transition: opacity 0.5s;
  animation: screenFade 0.4s ease-out forwards;
}
#loading.out { opacity: 0; pointer-events: none; }
@keyframes screenFade {
  0% { opacity: 0; }
  100% { opacity: 1; }
}
.ld-logo {
  width: 80px; height: 80px; border-radius: 22px;
  overflow: hidden;
  margin-bottom: 24px;
  box-shadow: 0 8px 36px rgba(0,0,0,.2);
  animation: ldpulse 1.6s ease-in-out infinite;
}
.ld-logo img {
  width: 100%; height: 100%; object-fit: cover;
  animation: logoReveal 1.2s ease-out forwards;
}
@keyframes logoReveal {
  0% { opacity: 0; filter: blur(12px); transform: scale(0.92); }
  100% { opacity: 1; filter: blur(0px); transform: scale(1); }
}
@keyframes ldpulse {
  0%,100%{transform:scale(1);box-shadow:0 8px 36px rgba(0,0,0,.2)}
  50%{transform:scale(1.07);box-shadow:0 12px 44px rgba(0,0,0,.3)}
}
.ld-title {
  font-family: 'Shippori Mincho B1', serif;
  font-size: 32px; font-weight: 800;
  color: var(--indigo); letter-spacing: 0.06em;
}
.ld-sub { font-size: 13px; color: var(--text2); margin-top: 6px; }

/* ──────────── LOGO ──────────── */
#logo {
  position: fixed; top: 16px; left: 16px; z-index: 900;
  width: 44px; height: 44px; border-radius: 12px;
  overflow: hidden;
  box-shadow: 0 3px 16px rgba(0,0,0,.2);
  cursor: pointer; user-select: none;
}
#logo img { width: 100%; height: 100%; object-fit: cover; }

/* ──────────── CITY HUD ──────────── */
#city-hud {
  position: fixed; top: 16px; left: 50%; transform: translateX(-50%);
  z-index: 900;
  background: var(--indigo); color: #fff;
  padding: 10px 22px; border-radius: 100px;
  font-size: 14px; font-weight: 700; letter-spacing: 0.03em;
  display: flex; align-items: center; gap: 8px;
  box-shadow: 0 4px 22px rgba(26,39,68,.38);
  cursor: pointer; user-select: none; white-space: nowrap;
  transition: transform 0.18s, box-shadow 0.18s;
}
#city-hud:active { transform: translateX(-50%) scale(0.95); }
#city-hud .hud-chevron { opacity: 0.55; font-size: 9px; margin-left: 2px; }

/* ──────────── TOP RIGHT CONTROLS ──────────── */
#controls {
  position: fixed; top: 16px; right: 16px; z-index: 900;
  display: flex; flex-direction: column; gap: 8px;
}
.ctrl {
  width: 44px; height: 44px; border-radius: 12px;
  background: var(--cream); border: none;
  display: flex; align-items: center; justify-content: center;
  box-shadow: 0 2px 14px rgba(26,39,68,.18);
  cursor: pointer; font-size: 18px;
  transition: transform 0.15s;
}
.ctrl:active { transform: scale(0.91); }
.ctrl.lit { background: var(--indigo); }
.ctrl.lit svg { stroke: white; }

/* ──────────── FILTER BAR ──────────── */
#filter-bar {
  position: absolute; bottom: 8px; left: 8px; right: 52px;
  display: flex; gap: 5px;
  overflow-x: auto; scrollbar-width: none;
  z-index: 1000;
}
#filter-bar::-webkit-scrollbar { display: none; }
.fchip {
  flex-shrink: 0; padding: 9px 15px; border-radius: 100px;
  background: var(--cream); border: 1.5px solid var(--sand);
  font-family: 'Zen Maru Gothic', sans-serif;
  font-size: 12px; font-weight: 700; color: var(--text);
  cursor: pointer; white-space: nowrap;
  box-shadow: 0 2px 10px rgba(26,39,68,.12);
  transition: all 0.15s;
}
.fchip.on { background: var(--indigo); color: #fff; border-color: var(--indigo); }
.fchip:active { transform: scale(0.94); }

/* ──────────── OVERLAY + SHEET ──────────── */
#overlay {
  position: fixed; inset: 0; z-index: 990;
  background: rgba(26,39,68,.42);
  opacity: 0; pointer-events: none;
  transition: opacity 0.28s;
}
#overlay.show { opacity: 1; pointer-events: all; }

#sheet {
  position: fixed; bottom: 0; left: 0; right: 0;
  z-index: 1000;
  background: var(--cream);
  border-radius: 26px 26px 0 0;
  transform: translateY(100%);
  transition: transform 0.36s cubic-bezier(.32,.72,0,1);
  max-height: 88vh; overflow-y: auto;
  box-shadow: 0 -8px 44px rgba(26,39,68,.22);
  padding-bottom: calc(16px + var(--sheet-safe));
}
#sheet.show { transform: translateY(0); }
.sheet-handle {
  width: 42px; height: 4px; border-radius: 2px;
  background: var(--sand); margin: 14px auto 0;
}
.sc { padding: 14px 20px 8px; }

/* ──────────── TOILET DETAIL ──────────── */
.t-name {
  font-family: 'Shippori Mincho B1', serif;
  font-size: 22px; font-weight: 800; color: var(--indigo);
  line-height: 1.3; margin: 6px 0 10px;
}
.t-tags { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 12px; }
.tag {
  padding: 4px 11px; border-radius: 100px;
  font-size: 11px; font-weight: 700; letter-spacing: 0.04em;
}
.tag.t1 { background:#EBF7EF; color:var(--moss); }
.tag.t2 { background:#FEF4E8; color:var(--amber); }
.tag.t3 { background:#FEFBE8; color:var(--gold); }
.tag.t4 { background:#FCECEB; color:var(--brick); }
.tag.partner { background:#EFF4E8; color:var(--partner); }
.tag.free { background:#EBF7EF; color:var(--moss); }
.tag.paid { background:#F4F4F4; color:var(--text2); }

.t-hours {
  font-size: 13px; color: var(--text2);
  display: flex; align-items: center; gap: 6px;
  margin-bottom: 16px;
}

/* ──────────── REVIEW CARD ──────────── */
.rv-card {
  background: #fff; border: 1.5px solid var(--sand2);
  border-radius: var(--r-lg); padding: 16px;
  margin-bottom: 16px;
}
.rv-head {
  display: flex; justify-content: space-between; align-items: center;
  margin-bottom: 12px;
}
.rv-label { font-size: 11px; font-weight: 700; color: var(--text3); letter-spacing: 0.07em; }
.rv-count { font-size: 11px; color: var(--text3); }
.rv-items { display: flex; gap: 8px; }
.rv-item {
  flex: 1; background: var(--cream); border-radius: 12px;
  padding: 12px 6px; text-align: center;
}
.rv-icon { font-size: 22px; line-height: 1; }
.rv-name { font-size: 10px; color: var(--text2); margin: 4px 0 2px; }
.rv-pct {
  font-size: 17px; font-weight: 700; color: var(--text3);
}
.rv-pct.hi { color: var(--moss); }
.rv-pct.lo { color: var(--brick); }
.rv-none { font-size: 12px; color: var(--text3); text-align: center; padding: 8px 0; }

/* ──────────── ACTION BTNS ──────────── */
.a-row { display: flex; gap: 10px; }
.a-primary {
  flex: 1; padding: 15px 10px;
  background: var(--vermillion); color: white; border: none;
  border-radius: var(--r); font-family: 'Zen Maru Gothic', sans-serif;
  font-size: 15px; font-weight: 700; cursor: pointer;
  transition: transform 0.15s, opacity 0.15s;
}
.a-primary.indigo { background: var(--indigo); }
.a-primary:active { transform: scale(0.96); opacity: .9; }
.a-sec {
  padding: 15px 18px;
  background: #fff; color: var(--indigo);
  border: 1.5px solid var(--sand); border-radius: var(--r);
  font-family: 'Zen Maru Gothic', sans-serif;
  font-size: 15px; font-weight: 700; cursor: pointer;
  transition: transform 0.15s;
}
.a-sec:active { transform: scale(0.96); }

/* ──────────── REVIEW FLOW ──────────── */
.rv-steps { display: flex; justify-content: center; gap: 7px; margin-bottom: 18px; }
.rv-dot {
  width: 7px; height: 7px; border-radius: 100px;
  background: var(--sand); transition: all 0.22s;
}
.rv-dot.on { background: var(--indigo); width: 20px; }
.rv-dot.dn { background: var(--moss); }

.rv-q {
  font-family: 'Shippori Mincho B1', serif;
  font-size: 26px; font-weight: 800; color: var(--indigo);
  text-align: center; line-height: 1.4; margin-bottom: 6px;
}
.rv-qsub { font-size: 13px; color: var(--text2); text-align: center; margin-bottom: 28px; }
.rv-choices { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.rv-choice {
  padding: 24px 10px; border-radius: 18px;
  border: 2px solid var(--sand2); background: #fff;
  display: flex; flex-direction: column; align-items: center; gap: 10px;
  font-family: 'Zen Maru Gothic', sans-serif;
  font-size: 16px; font-weight: 700; color: var(--indigo);
  cursor: pointer; transition: all 0.15s;
}
.rv-choice:active { transform: scale(0.95); }
.rv-choice.yes:active { border-color: var(--moss); background: #EBF7EF; color: var(--moss); }
.rv-choice.no:active  { border-color: var(--brick); background: #FCECEB; color: var(--brick); }
.rv-choice .ce { font-size: 36px; }

.rv-thanks { text-align: center; padding: 24px 0 8px; }
.rv-thanks .te { font-size: 52px; margin-bottom: 14px; }
.rv-thanks .tt {
  font-family: 'Shippori Mincho B1', serif;
  font-size: 24px; font-weight: 800; color: var(--indigo); margin-bottom: 6px;
}
.rv-thanks .ts { font-size: 14px; color: var(--text2); }

/* ──────────── CITY PICKER ──────────── */
#cpicker {
  position: fixed; inset: 0; z-index: 1100;
  background: rgba(26,39,68,.5);
  backdrop-filter: blur(5px);
  display: none; align-items: flex-end;
}
#cpicker.show { display: flex; }
.cp-sheet {
  width: 100%; background: var(--cream);
  border-radius: 26px 26px 0 0;
  padding: 14px 20px calc(32px + var(--sheet-safe));
  box-shadow: 0 -8px 44px rgba(26,39,68,.22);
  animation: su 0.32s cubic-bezier(.32,.72,0,1);
  max-height: 70vh; overflow-y: auto;
}
@keyframes su { from{transform:translateY(100%)} to{transform:translateY(0)} }
.cp-title {
  font-family: 'Shippori Mincho B1', serif;
  font-size: 18px; font-weight: 800; color: var(--indigo);
  text-align: center; margin: 8px 0 18px;
}
.cp-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.cp-item {
  padding: 16px 10px; border-radius: var(--r);
  background: #fff; border: 1.5px solid var(--sand2);
  text-align: center; cursor: pointer; transition: all 0.15s;
}
.cp-item:active { transform: scale(0.95); }
.cp-item.on { background: var(--indigo); border-color: var(--indigo); color: #fff; }
.cp-item .cf { font-size: 24px; margin-bottom: 5px; }
.cp-item .cl { font-size: 13px; font-weight: 700; }
.cp-item .cs { font-size: 10px; color: var(--text3); margin-top: 2px; }
.cp-item.on .cs { color: rgba(255,255,255,.6); }

/* ──────────── MARKERS ──────────── */
.leaflet-div-icon, .mk-icon { background: none !important; border: none !important; }
.mk-dot {
  width: 36px; height: 36px; border-radius: 50%;
  border: 2.5px solid white;
  box-shadow: 0 2px 6px rgba(0,0,0,.35);
}
.cluster-icon {
  display: flex; align-items: center; justify-content: center;
  border-radius: 50%; border: 2px solid white;
  font-size: 11px; font-weight: 700; color: #fff;
  box-shadow: 0 2px 8px rgba(0,0,0,.3);
}

/* ──────────── BOTTOM TABS ──────────── */
/* ──────────── BOTTOM AREA ──────────── */
#bottom {
  height: 260px; flex-shrink: 0;
  background: #faf9f6;
  border-top: 0.5px solid #e0dbd4;
  display: flex; flex-direction: column;
}
#bottom-tabs {
  display: flex; flex-shrink: 0;
  border-bottom: 0.5px solid #e8e4de;
}
.btab {
  flex: 1; padding: 10px 0 8px; border: none; background: none;
  font-family: 'Zen Maru Gothic', sans-serif;
  font-size: 11px; font-weight: 700; color: var(--text3);
  display: flex; flex-direction: column; align-items: center; gap: 2px;
  cursor: pointer;
}
.btab.on { color: var(--indigo); }
.btab .btab-icon { font-size: 18px; }

/* ──────────── SEARCH TAB ──────────── */
#search-panel {
  flex: 1; overflow-y: auto;
  padding: 12px 16px;
  display: none;
}
#search-panel.show { display: block; }
#search-input {
  width: 100%; padding: 12px 16px; border-radius: var(--r);
  border: 1.5px solid var(--sand); background: #fff;
  font-family: 'Zen Maru Gothic', sans-serif; font-size: 14px;
  outline: none;
}
#search-input:focus { border-color: var(--indigo); }
#search-results { margin-top: 8px; max-height: 40vh; overflow-y: auto; }

/* ──────────── INLINE REVIEW ──────────── */
.irv-q {
  display: flex; align-items: center; gap: 10px;
  padding: 10px 0; border-bottom: 1px solid var(--sand2);
}
.irv-q:last-child { border-bottom: none; }
.irv-icon { font-size: 20px; }
.irv-text { flex: 1; font-size: 13px; font-weight: 600; color: var(--text); }
.irv-btn {
  padding: 6px 14px; border-radius: 8px; border: 1.5px solid var(--sand);
  background: #fff; font-size: 12px; font-weight: 700; cursor: pointer;
  font-family: 'Zen Maru Gothic', sans-serif;
}
.irv-btn.yes { border-color: var(--moss); color: var(--moss); background: #EBF7EF; }
.irv-btn.no { border-color: var(--brick); color: var(--brick); background: #FCECEB; }
.irv-submit {
  width: 100%; padding: 12px; margin-top: 8px;
  background: var(--moss); color: #fff; border: none; border-radius: var(--r);
  font-family: 'Zen Maru Gothic', sans-serif; font-size: 14px; font-weight: 700;
  cursor: pointer;
}

/* ──────────── NUDGE TOAST ──────────── */
#nudge {
  position: fixed; bottom: 80px; left: 16px; right: 16px; z-index: 1200;
  background: var(--indigo); color: #fff; padding: 14px 18px;
  border-radius: var(--r); display: none; align-items: center; gap: 12px;
  box-shadow: 0 4px 20px rgba(26,39,68,.4);
}
#nudge.show { display: flex; }
#nudge-text { flex: 1; font-size: 13px; font-weight: 600; }
#nudge-btn {
  padding: 8px 14px; background: var(--moss); color: #fff; border: none;
  border-radius: 8px; font-size: 12px; font-weight: 700; cursor: pointer;
  white-space: nowrap;
}
#nudge-close {
  background: none; border: none; color: rgba(255,255,255,.5);
  font-size: 18px; cursor: pointer;
}

/* ──────────── BLINK MARKER ──────────── */
@keyframes mkblink {
  0%,100% { transform: scale(1); }
  50% { transform: scale(1.45); }
}
.mk-blink .mk-dot { animation: mkblink 0.35s ease-in-out 4; }

/* ──────────── USER LOCATION ──────────── */
@keyframes me-ripple {
  0%   { box-shadow: 0 0 0 0 rgba(231,76,60,.5), 0 2px 6px rgba(0,0,0,.3); }
  70%  { box-shadow: 0 0 0 14px rgba(231,76,60,0), 0 2px 6px rgba(0,0,0,.3); }
  100% { box-shadow: 0 0 0 0 rgba(231,76,60,0), 0 2px 6px rgba(0,0,0,.3); }
}
.me-dot {
  width: 22px; height: 22px;
  background: #E74C3C; border: 3px solid white;
  border-radius: 50%;
  animation: me-ripple 1.8s infinite;
}

/* ──────────── QUICK REVIEW ──────────── */
.qk-row { display: flex; gap: 8px; margin-top: 4px; }
.qk-btn {
  flex: 1; padding: 12px 6px; border-radius: var(--r); border: 1.5px solid transparent;
  font-family: 'Zen Maru Gothic', sans-serif; font-size: 13px; font-weight: 700;
  cursor: pointer; text-align: center; transition: all 0.15s;
}
.qk-btn:active { transform: scale(0.95); }
.qk-yes { background: #f0fdf4; color: #166534; border-color: #bbf7d0; }
.qk-no  { background: #fef2f2; color: #991b1b; border-color: #fecaca; }
.qk-closed { background: #f1f5f9; color: #475569; border-color: #e2e8f0; }
.qk-yes.sel { background: #dcfce7; border-color: #166534; }
.qk-no.sel  { background: #fee2e2; border-color: #991b1b; }
.qk-closed.sel { background: #e2e8f0; border-color: #475569; }
.qk-more {
  display: block; margin: 10px auto 0; background: none; border: none;
  color: var(--indigo); font-size: 13px; font-weight: 700; cursor: pointer;
  font-family: 'Zen Maru Gothic', sans-serif; text-decoration: underline;
}

/* ──────────── INLINE LEGEND ──────────── */
#legend-inline {
  position: absolute; bottom: 52px; right: 8px; z-index: 1000;
  display: flex; flex-direction: column; gap: 3px;
  background: rgba(255,255,255,.88); padding: 5px 8px;
  border-radius: 7px; border: 0.5px solid rgba(0,0,0,.08);
  pointer-events: none;
}
.lg-row { display: flex; align-items: center; gap: 5px; }
.lg-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
.lg-label { font-size: 9px; font-weight: 600; color: var(--text2); white-space: nowrap; }

/* ──────────── ADD BUTTON ──────────── */
#add-btn {
  position: absolute; bottom: 8px; right: 8px; z-index: 1000;
  width: 40px; height: 40px; border-radius: 50%;
  background: #1FA855; color: white; border: none;
  font-size: 20px; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  box-shadow: 0 2px 8px rgba(31,168,85,.4);
}
#add-btn:active { transform: scale(0.9); }

/* ──────────── REPORT CHOICES ──────────── */
.rpt-choice {
  display: block; width: 100%; text-align: left;
  padding: 14px 16px; margin-bottom: 6px;
  background: #fff; border: 1.5px solid var(--sand);
  border-radius: var(--r); cursor: pointer;
  font-family: 'Zen Maru Gothic', sans-serif;
  font-size: 14px; font-weight: 600; color: var(--text);
}
.rpt-choice:active { background: var(--sand2); }

/* ──────────── ADD FORM ──────────── */
.add-input {
  width: 100%; padding: 12px 14px; border: 1.5px solid var(--sand);
  border-radius: var(--r); font-family: 'Zen Maru Gothic', sans-serif;
  font-size: 14px; margin-bottom: 10px; outline: none;
}
.add-input:focus { border-color: var(--indigo); }
.add-type-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin-bottom: 14px; }
.add-type-btn {
  padding: 10px 6px; border: 1.5px solid var(--sand); border-radius: var(--r);
  background: #fff; text-align: center; font-size: 12px; font-weight: 700;
  cursor: pointer; font-family: 'Zen Maru Gothic', sans-serif;
}
.add-type-btn.on { background: var(--indigo); color: #fff; border-color: var(--indigo); }

/* ──────────── LEGEND BUTTON ──────────── */
#legend-btn {
  position: fixed; bottom: 68px; right: 16px; z-index: 800;
  width: 40px; height: 40px; border-radius: 50%;
  background: var(--cream); border: 1.5px solid var(--sand);
  box-shadow: 0 2px 14px rgba(26,39,68,.18);
  font-size: 16px; font-weight: 700; color: var(--indigo);
  cursor: pointer; display: flex; align-items: center; justify-content: center;
  transition: transform 0.15s;
}
#legend-btn:active { transform: scale(0.91); }

/* ──────────── NEARBY LIST ──────────── */
#nearby {
  flex: 1; overflow-y: auto;
  padding: 8px 14px 12px;
}
#nearby .nb-handle {
  width: 36px; height: 4px; border-radius: 2px;
  background: var(--sand); margin: 0 auto 8px;
}
.nb-card, .list-item {

/* ═══════════════════════════════════
   TIER CONFIG
═══════════════════════════════════ */
const TIER_CONFIG = {
  brands: {
    T1_JP: ['familymart','lawson','7-eleven','seven-eleven','セブン','ファミリーマート','ローソン'],
    T2_PLUS: ['starbucks','mcdonald','dunkin','whole foods','trader joe','target','walmart','peets','mos burger','モスバーガー'],
  },
  types: {
    T1: ['subway_station','train_station','park','library','city_hall','public_bathroom'],
    T2_PLUS: ['cafe','convenience_store','supermarket','department_store','shopping_mall'],
    T2_MINUS: ['transit_station','point_of_interest','establishment'],
    T3: ['lodging','restaurant','bar','food'],
  },
  colors: {
    T1:       { from:'#5BE89A', to:'#1FA855', opacity:1.0 },
    T2_PLUS:  { from:'#74b9ff', to:'#2980B9', opacity:1.0 },
    T2_MINUS: { from:'#FDCA6E', to:'#E67E22', opacity:0.75 },
    T3:       { from:'#f9ca24', to:'#d4a00a', opacity:0.65 },
    T4:       { from:'#F28B82', to:'#C0392B', opacity:0.45 },
    PARTNER:  { from:'#e0e0e0', to:'#9e9e9e', opacity:1.0 },
  },
  display: {
    minVisible: 3,
    defaultTiers: ['T1','T2_PLUS','PARTNER'],
    fallbackTiers: ['T2_MINUS','T3','T4'],
  }
};

const TIER_WEIGHT = {T1:5, T2_PLUS:4, T2_MINUS:3, T3:2, T4:1, PARTNER:5};

/* ═══════════════════════════════════
   MARKERS
═══════════════════════════════════ */
function tierKey(t) {
  if (t.isPartner) return 'PARTNER';
  const name = (t.name || '').toLowerCase();
  const types = t.types || [];
  // Brand matching
  if (TIER_CONFIG.brands.T1_JP.some(b => name.includes(b))) return 'T1';
  if (TIER_CONFIG.brands.T2_PLUS.some(b => name.includes(b))) return 'T2_PLUS';
  // Type matching
  if (types.some(tp => TIER_CONFIG.types.T1.includes(tp))) return 'T1';
  if (types.some(tp => TIER_CONFIG.types.T2_PLUS.includes(tp))) return 'T2_PLUS';
  if (types.some(tp => TIER_CONFIG.types.T3.includes(tp))) return 'T3';
  if (types.some(tp => TIER_CONFIG.types.T2_MINUS.includes(tp))) return 'T2_MINUS';
  // Fallback from existing tier number
  const fb = {1:'T1', 2:'T2_PLUS', 3:'T3', 4:'T4'};
  return fb[t.tier] || 'T4';
}

function makeIcon(toilet) {
  const tk = tierKey(toilet);
  const c = TIER_CONFIG.colors[tk] || TIER_CONFIG.colors.T4;
  return L.divIcon({
    html: `<div class="mk-dot" style="background:radial-gradient(circle at 35% 30%,${c.from},${c.to});opacity:${c.opacity}"></div>`,
    className: 'mk-icon', iconSize: [36,36], iconAnchor: [18,18]
  });
}

function clusterIcon(count, bestTier) {
  const c = TIER_CONFIG.colors[bestTier] || TIER_CONFIG.colors.T4;
  const sz = count > 50 ? 44 : (count > 20 ? 38 : 32);
  return L.divIcon({
    html: `<div class="cluster-icon" style="width:${sz}px;height:${sz}px;background:${c.to}">${count}</div>`,
    className: '', iconSize: [sz,sz], iconAnchor: [sz/2,sz/2]
  });
}

function scoreToilets(toilets) {
  if (userLat == null || userLng == null) return toilets.slice(0, 30);
  return toilets
    .map(t => {
      const d = Math.hypot((t.lat - userLat)*111320, (t.lng - userLng)*111320*Math.cos(userLat*Math.PI/180));
      const w = TIER_WEIGHT[tierKey(t)] || 1;
      return {...t, _score: d / w, _dist: d};
    })
    .sort((a,b) => a._score - b._score)
    .slice(0, 30);
}

function addMarker(toilet) {
  const m = L.marker([toilet.lat, toilet.lng], { icon: makeIcon(toilet) });
  m.on('click', () => openDetail(toilet));
  allMarkers.push({ m, toilet, onMap: false });
}

function clearMarkers() {
  allMarkers.forEach(({m}) => map.removeLayer(m));
  allMarkers = [];
  clusterMarkers.forEach(m => map.removeLayer(m));
  clusterMarkers = [];
}

let clusterMarkers = [];

function applyFilter(f) {
  activeFilter = f || activeFilter;
  refreshZoom();
}

function refreshZoom() {
  const zoom = map ? map.getZoom() : 15;
  console.log('[ZOOM] refresh zoom:', zoom, 'markers:', allMarkers.length);
  // Remove all current
  allMarkers.forEach(o => { if (o.onMap) { map.removeLayer(o.m); o.onMap = false; } });
  clusterMarkers.forEach(m => map.removeLayer(m));
  clusterMarkers = [];

  // Filter
  let visible = allMarkers.filter(({toilet}) => {
    if (activeFilter === 'pub')  return toilet.cat === 'Public';
    if (activeFilter === 'ibd')  return !!toilet.isPartner;
    if (activeFilter === 'free') return !!toilet.free;
    return true;
  });

  console.log('[ZOOM] visible after filter:', visible.length, 'mode:', zoom >= 14 ? 'bubbles' : 'cluster');
  if (zoom >= 14) {
    // Individual bubbles
    visible.forEach(o => { o.m.addTo(map); o.onMap = true; });
  } else {
    // Cluster mode
    const grid = {};
    const cellSize = zoom <= 10 ? 0.5 : (zoom <= 12 ? 0.2 : 0.1);
    visible.forEach(({toilet}) => {
      const gx = Math.floor(toilet.lng / cellSize);
      const gy = Math.floor(toilet.lat / cellSize);
      const key = `${gx}_${gy}`;
      if (!grid[key]) grid[key] = {lats:[], lngs:[], count:0, bestTier:'T4', tierRank:99};
      grid[key].lats.push(toilet.lat);
      grid[key].lngs.push(toilet.lng);
      grid[key].count++;
      const tk = tierKey(toilet);
      const ranks = {PARTNER:0, T1:1, T2_PLUS:2, T2_MINUS:3, T3:4, T4:5};
      const rank = ranks[tk] ?? 5;
      if (rank < grid[key].tierRank) { grid[key].tierRank = rank; grid[key].bestTier = tk; }
    });
    const cells = Object.values(grid);
    console.log('[ZOOM] clusters:', cells.length, 'cellSize:', cellSize);
    cells.forEach(g => {
      const lat = g.lats.reduce((a,b)=>a+b,0) / g.count;
      const lng = g.lngs.reduce((a,b)=>a+b,0) / g.count;
      const cm = L.marker([lat, lng], { icon: clusterIcon(g.count, g.bestTier) });
      cm.addTo(map);
      clusterMarkers.push(cm);
    });
  }
}

/* ═══════════════════════════════════

async function loadCity(cityKey) {
  console.log('[LOAD] start', cityKey);
  ldmsg(tr('loadCity'));
  const ck = `oasis_v4_${cityKey}`;
  try {
    const raw = localStorage.getItem(ck);
    if (raw) {
      const {ts, d} = JSON.parse(raw);
      if (Date.now() - ts < CACHE_MS) {
        console.log('[LOAD] cache hit', d.length);
        renderCity(d);
        hideLoading();
        return;
      }
    }
  } catch(e) { console.warn('[LOAD] cache err', e); }

  let toilets = [];
  for (let i = 0; i < 15; i++) {
    try {
      const snap = await db.collection('cities').doc(cityKey).collection('chunks').doc(`${i}`).get();
      console.log(`[LOAD] chunk ${i} exists:`, snap.exists);
      if (snap.exists) {
        const arr = snap.data().toilets || [];
        console.log(`[LOAD] chunk ${i} items:`, arr.length);
        toilets = toilets.concat(arr);
      }
    } catch(e) {
      console.error(`[LOAD] chunk ${i} error:`, e.code, e.message);
    }
  }
  console.log('[LOAD] total', toilets.length);
  if (toilets.length) {
    try { localStorage.setItem(ck, JSON.stringify({ts: Date.now(), d: toilets})); } catch(e) {}
  }
  renderCity(toilets);
  hideLoading();
}

function renderCity(toilets) {
  console.log('[RENDER] renderCity start', toilets.length);
  clearMarkers();
  removeEmptyState();
  allToilets = toilets;
  const scored = scoreToilets(toilets);
  console.log('[RENDER] total:', toilets.length, 'scored:', scored.length, 'zoom:', map?.getZoom());
  scored.forEach(t => addMarker(t));
  console.log('[RENDER] allMarkers created:', allMarkers.length);
  if (scored.length === 0) showEmptyState();
  applyFilter();
  updateHud(activeCity);
  renderNearby();
  console.log('[RENDER] renderCity end');
}

/* ═══════════════════════════════════
   NEARBY LIST
═══════════════════════════════════ */
function distMeters(lat1, lng1, lat2, lng2) {
  const R = 6371000;
  const dLat = (lat2 - lat1) * Math.PI / 180;
  const dLng = (lng2 - lng1) * Math.PI / 180;
  const a = Math.sin(dLat/2)**2 + Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLng/2)**2;
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}

function fmtDist(m) {
  const min = Math.ceil(m / 80);
  return T.walkMin(min);
}

const TIER_EMOJI = {T1:'🟢', T2_PLUS:'🔵', T2_MINUS:'🟠', T3:'🟡', T4:'🔴', PARTNER:'⚪'};
const TIER_LABEL_KEY = {T1:'t1', T2_PLUS:'t2', T2_MINUS:'t2', T3:'t3', T4:'t4', PARTNER:'tagPartner'};

function stageExpand(toilets) {
  const cfg = TIER_CONFIG.display;
  let visible = toilets.filter(t => cfg.defaultTiers.includes(tierKey(t)));
  for (const fb of cfg.fallbackTiers) {
    if (visible.length >= cfg.minVisible) break;
    visible = visible.concat(toilets.filter(t => tierKey(t) === fb));
  }
  return visible;
}

let nearbyExpanded = false;

function renderNearby() {
  const el = document.getElementById('nearby');
  const list = document.getElementById('nb-list');
  nearbyExpanded = false;
  if (userLat == null || userLng == null || !allToilets.length) {
    el.classList.remove('show');
    return;
  }
  const withDist = allToilets
    .map(t => ({...t, dist: distMeters(userLat, userLng, t.lat, t.lng)}))
    .sort((a,b) => a.dist - b.dist);

  const staged = stageExpand(withDist).slice(0, 5);
  const hiddenCount = withDist.length - staged.length;

  list.innerHTML = renderNearbyCards(staged)
    + (hiddenCount > 0 ? `<button class="a-sec" style="width:100%;margin-top:4px" onclick="expandNearby()">${tr('showMore').replace('{n}', hiddenCount)}</button>` : '');

  el.classList.add('show');
}

/* ═══════════════════════════════════
   GEOLOCATION
═══════════════════════════════════ */
function goToMe() {
  if (!navigator.geolocation) return;
  navigator.geolocation.getCurrentPosition(pos => {
    const {latitude: lat, longitude: lng} = pos.coords;
    userLat = lat; userLng = lng;
    document.getElementById('loc-btn').classList.add('lit');
    if (userDot) map.removeLayer(userDot);
    userDot = L.marker([lat, lng], { icon: L.divIcon({
      html: '<div class="me-dot"></div>',
      className: '', iconSize: [22,22], iconAnchor: [11,11]
    }) }).addTo(map);
    const detected = detectCity(lat, lng);
    if (detected && detected !== activeCity) {
      activeCity = detected;
      showLoading();
      map.flyTo([lat, lng], 15, {duration: 1.2});
      setTimeout(() => map.invalidateSize(), 300);
      loadCity(detected);
    } else {
      map.flyTo([lat, lng], 15, {duration: 1.2});
      setTimeout(() => map.invalidateSize(), 300);
    }
  }, () => {}, {enableHighAccuracy: true, timeout: 10000});
}

function detectCity(lat, lng) {
  for (const [k, c] of Object.entries(CITIES)) {
    const b = c.bbox, p = 0.05;
    if (lat >= b.s-p && lat <= b.n+p && lng >= b.w-p && lng <= b.e+p) return k;
  }
  return null;
}

function compressHours(hours) {
  if (!hours) return '';
  if (typeof hours === 'string') return hours;
  if (!Array.isArray(hours) || hours.length === 0) return '';
  const fmt = s => s.replace(/(\d+):00\s*(AM|PM)/gi, (_, h, ap) => h + ap.toUpperCase());
  const times = hours.map(h => { const p = h.split(': '); return p.length > 1 ? fmt(p.slice(1).join(': ')) : fmt(h); });
  const unique = [...new Set(times)];
  if (unique.length === 1) return `${tr('hoursEveryDay')} ${unique[0]}`;
  if (hours.length >= 7) {
    const wd = times.slice(0, 5), we = times.slice(5);
    const wdU = [...new Set(wd)], weU = [...new Set(we)];
    if (wdU.length === 1 && weU.length === 1) return `${tr('hoursWeekday')} ${wdU[0]} / ${tr('hoursWeekend')} ${weU[0]}`;
  }
  return times[0];
}

/* ═══════════════════════════════════
   INLINE REVIEW (in detail sheet)
═══════════════════════════════════ */
const RV_STEPS = ['access', 'priv', 'paper'];
const RV_ICONS = ['🚪', '🔒', '🧻'];
const RV_Q_KEY = ['q1', 'q2', 'q3'];

function startInlineReview() {
  reviewStep = 0; reviewData = {};
  const el = document.getElementById('inline-review');
  if (el) el.style.display = 'block';
  renderInlineStep();
}

function renderInlineStep() {
  const el = document.getElementById('inline-review');
  if (!el) return;
  const n = reviewStep;
  if (n >= RV_STEPS.length) {
    el.innerHTML = `
      <input class="add-input" id="rv-comment" placeholder="${tr('rvComment')}" style="margin-top:8px">
      <button class="irv-submit" onclick="submitReview()">${tr('sendReview')}</button>`;
    return;
  }
  el.innerHTML = `
    <div class="irv-q" style="border-bottom:none;padding-top:12px">
      <span class="irv-icon">${RV_ICONS[n]}</span>
      <span class="irv-text">${tr(RV_Q_KEY[n])}</span>
      <button class="irv-btn" onclick="inlineAnswer(true)">${tr('yes')}</button>
      <button class="irv-btn" onclick="inlineAnswer(false)">${tr('no')}</button>
    </div>`;
}

function inlineAnswer(val) {
  reviewData[RV_STEPS[reviewStep]] = val;
  reviewStep++;
  renderInlineStep();
}

async function submitReview() {
  const comment = document.getElementById('rv-comment')?.value || '';
  const el = document.getElementById('inline-review');
  if (el) el.innerHTML = `<div class="rv-thanks" style="padding:12px 0"><div class="te" style="font-size:32px">🙏</div><div class="tt" style="font-size:16px">${tr('thanks')}</div></div>`;
  if (!currentToilet) return;
  try {
    await db.collection('reviews').add({
      toiletId: currentToilet.id, cityKey: activeCity,
      access: !!reviewData.access, priv: !!reviewData.priv, paper: !!reviewData.paper,
      comment: comment || null,
      ts: firebase.firestore.FieldValue.serverTimestamp(),
    });
    const ref = db.collection('reviewSummaries').doc(currentToilet.id);
    await db.runTransaction(async tx => {
      const doc = await tx.get(ref);
      const inc = { total:1, access: reviewData.access?1:0, priv: reviewData.priv?1:0, paper: reviewData.paper?1:0 };
      if (!doc.exists) { tx.set(ref, inc); }
      else {
        const d = doc.data();
        tx.update(ref, { total:(d.total||0)+1, access:(d.access||0)+inc.access, priv:(d.priv||0)+inc.priv, paper:(d.paper||0)+inc.paper });
      }
    });
  } catch(e) { console.error('Review error', e); }
}

let searchTimer = null;
function searchCity(q) {
  clearTimeout(searchTimer);
  if (q.length < 2) { document.getElementById('search-results').innerHTML = ''; return; }
  // First check local cities
  const local = Object.entries(CITIES).filter(([k,c]) =>
    c.ja.includes(q) || c.en.toLowerCase().includes(q.toLowerCase())
  );
  if (local.length) {
    document.getElementById('search-results').innerHTML = local.map(([k,c]) =>
      `<div class="nb-card" onclick="selectCity('${k}');switchTab('near')">
        <span class="nb-tier">${c.flag}</span>
        <div class="nb-info"><div class="nb-name">${cityLabel(k)}</div></div>
      </div>`
    ).join('');
    return;
  }
  // Nominatim fallback
  searchTimer = setTimeout(async () => {
    try {
      const res = await fetch(`https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(q)}&format=json&limit=5`);
      const data = await res.json();
      document.getElementById('search-results').innerHTML = data.map(r =>
        `<div class="nb-card" onclick="map.flyTo([${r.lat},${r.lon}],15,{duration:1});switchTab('near')">
          <span class="nb-tier">📍</span>
          <div class="nb-info"><div class="nb-name">${r.display_name.split(',').slice(0,2).join(',')}</div></div>
        </div>`
      ).join('');
    } catch(e) {}
  }, 500);
}

  ];
  el.innerHTML = items.map(i =>
    `<div class="lg-row"><div class="lg-dot" style="background:${i.color}"></div><span class="lg-label">${i.label}</span></div>`
  ).join('');
}

/* ═══════════════════════════════════
   CITY PICKER
═══════════════════════════════════ */
function openPicker() {
  document.getElementById('cp-title').textContent = tr('pickCity');
  const grid = document.getElementById('cp-grid');
  grid.innerHTML = '';
  Object.entries(CITIES).forEach(([k, c]) => {
    const el = document.createElement('div');
    el.className = 'cp-item' + (k === activeCity ? ' on' : '');
    el.dataset.k = k;
    el.innerHTML = `<div class="cf">${c.flag}</div><div class="cl">${cityLabel(k)}</div>`;
    el.onclick = () => selectCity(k);
    grid.appendChild(el);
  });
  document.getElementById('cpicker').classList.add('show');
}
function closePicker() { document.getElementById('cpicker').classList.remove('show'); }
function bgPicker(e) { if (e.target === document.getElementById('cpicker')) closePicker(); }

/* ═══════════════════════════════════
   LOADING HELPERS
═══════════════════════════════════ */
function showLoading() { document.getElementById('loading').classList.remove('out'); }
function hideLoading() {
  var el = document.getElementById('loading');
  el.classList.add('out');
  setTimeout(function(){ el.style.display = 'none'; }, 600);
}
function ldmsg(t)      { document.getElementById('ld-msg').textContent = t; }

/* ═══════════════════════════════════
   UPDATE UI STRINGS
═══════════════════════════════════ */
function applyLang() {
  document.getElementById('f-all').textContent  = tr('all');
  document.getElementById('f-pub').innerHTML    = tr('pub');
  document.getElementById('f-ibd').innerHTML    = tr('ibd');
  document.getElementById('f-free').innerHTML   = tr('free');
  document.documentElement.lang = LANG;
  var ja = document.getElementById('lt-ja');
  var en = document.getElementById('lt-en');
  if (ja && en) {
    ja.style.background = LANG==='ja' ? '#1a2744' : 'none';
    ja.style.color = LANG==='ja' ? 'white' : '#888';
    en.style.background = LANG==='en' ? '#1a2744' : 'none';
    en.style.color = LANG==='en' ? 'white' : '#888';
  }
}

/* ═══════════════════════════════════
   INIT
═══════════════════════════════════ */
async function init() {
  ldmsg(tr('loading'));
  applyLang();
  renderInlineLegend();
  initMap();

  // Attempt auto-locate
  if (navigator.geolocation) {
    navigator.geolocation.getCurrentPosition(pos => {
      const {latitude: lat, longitude: lng} = pos.coords;
      userLat = lat; userLng = lng;
      document.getElementById('loc-btn').classList.add('lit');
      if (userDot) map.removeLayer(userDot);
      userDot = L.marker([lat, lng], { icon: L.divIcon({
        html: '<div class="me-dot"></div>',
        className: '', iconSize: [20,20], iconAnchor: [10,10]
      }) }).addTo(map);
      const detected = detectCity(lat, lng);
      if (detected && detected !== activeCity) {
        activeCity = detected;
        loadCity(detected);
      } else if (allToilets.length) {
        renderCity(allToilets);
      }
      map.flyTo([lat, lng], 15, {duration: 1.2});
      setTimeout(() => { map.invalidateSize(); renderNearby(); }, 400);
    }, () => {}, {enableHighAccuracy: true, timeout: 8000});
  }

  await loadCity(activeCity);
  setTimeout(() => map.invalidateSize(), 150);
}

init();
</script>
