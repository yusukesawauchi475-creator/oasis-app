name: Monthly Data Refresh

on:
  schedule:
    - cron: '0 18 1 * *'  # UTC 18:00 on 1st = JST 03:00 on 1st
  workflow_dispatch: {}

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: |
          cd scripts
          npm init -y 2>/dev/null || true
          npm install firebase-admin node-fetch@2

      - name: Run monthly refresh
        env:
          FIREBASE_SA_KEY: ${{ secrets.FIREBASE_SA_KEY }}
          PLACES_API_KEY: ${{ secrets.PLACES_API_KEY }}
        run: node scripts/monthly_refresh.js 2>&1 | tee /tmp/refresh_report.txt

      - name: Create GitHub Issue with report
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          REPORT=$(cat /tmp/refresh_report.txt)
          DATE=$(date +%Y-%m-%d)
          gh issue create \
            --repo "${{ github.repository }}" \
            --title "[Monthly Refresh] $DATE" \
            --body "## Monthly Data Refresh Report

\`\`\`
$REPORT
\`\`\`

---
*Auto-generated by Monthly Refresh workflow*"
